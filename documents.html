    <!-- Apply theme immediately to prevent flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme-preference");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>

    <!-- CRITICAL SECURITY: Auth check BEFORE page loads -->
    <script>
      (function () {
        "use strict";

        // Dev mode check
        if (window.DEV_CONFIG && window.DEV_CONFIG.DEV_MODE) {
          console.warn("[Inline Security] 🔧 DEV_MODE - Pomijam sprawdzenia");
          return;
        }

        function isMobile() {
          if (window.DEV_CONFIG && window.DEV_CONFIG.ALLOW_DESKTOP) return true;
          const ua = navigator.userAgent.toLowerCase();
          return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(
            ua
          );
        }
        function isStandalone() {
          if (window.DEV_CONFIG && window.DEV_CONFIG.SKIP_PWA_CHECK)
            return true;
          return (
            window.navigator.standalone === true ||
            window.matchMedia("(display-mode: standalone)").matches ||
            window.matchMedia("(display-mode: fullscreen)").matches
          );
        }
        if (!isMobile()) {
          window.location.href = "./index.html";
          document.documentElement.style.display = "none";
          throw new Error("Desktop blocked");
        }
        if (!isStandalone()) {
          window.location.href = "./index.html";
          document.documentElement.style.display = "none";
          throw new Error("Not standalone");
        }
    </script>

    <!-- Service Worker registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          // Service Worker nie działa z file:// protokołem
          if (window.location.protocol === "file:") {
            console.warn(
              "[SW] Service Worker nie działa z file:// protokołem. Użyj lokalnego serwera HTTP."
            );
            return;
          }

          navigator.serviceWorker
            .register("/sw.js")
            .then(function (registration) {
              console.log(
                "[SW] ✅ Zarejestrowany pomyślnie:",
                registration.scope
              );

              // Check for updates
              registration.update();

              // Listen for updates
              registration.addEventListener("updatefound", function () {
                console.log("[SW] Znaleziono aktualizację...");
                const newWorker = registration.installing;
                newWorker.addEventListener("statechange", function () {
                  console.log("[SW] Stan:", newWorker.state);
                });
              });
            })
            .catch(function (err) {
              console.error("[SW] ❌ Rejestracja nie powiodła się:", err);
            });

          // Listen for controller changes
          navigator.serviceWorker.addEventListener(
            "controllerchange",
            function () {
              console.log("[SW] Kontroler zmieniony, przeładowanie strony...");
              window.location.reload();
            }
          );
        });
      } else {
        console.warn(
          "[SW] Service Worker nie jest wspierany w tej przeglądarce"
        );
      }
    </script>

  <script>
      document.addEventListener("DOMContentLoaded", function () {
        var btn = document.getElementById("add-doc-btn");

        if (btn) {
          btn.addEventListener(
            "click",
            function (e) {
              // 1. SPRAWDZAMY CZY UŻYTKOWNIK JUŻ MA PREMIUM
              if (localStorage.getItem("premium_active") === "true") {
                // Jeśli tak, kończymy działanie naszego skryptu i pozwalamy otworzyć menu
                return; 
              }

              // 2. JEŚLI NIE MA, PYTAMY O HASŁO
              var password = prompt("Podaj hasło:");

              if (password === "premium") {
                // Jeśli hasło poprawne:
                alert("PAKIET PREMIUM AKTYWOWANY ! DZIĘKUJEMY !");
                
                // ZAPISUJEMY W PAMIĘCI PRZEGLĄDARKI
                localStorage.setItem("premium_active", "true");

                // Pozwalamy otworzyć menu
              } else {
                // Jeśli hasło błędne:
                alert("NIE POSIADASZ PAKIETU PREMIUM !");
                
                // Blokujemy przycisk
                e.stopImmediatePropagation();
                e.preventDefault();
              }
            },
            { capture: true }
          );
        }
      });
