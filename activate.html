<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>Aktywacja urządzenia</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/theme.css">

<style>
/* ============================= */
/* ===== BLACK + YELLOW UI ===== */
/* ============================= */

:root{
    --yellow:#ffcc00;
    --yellow-soft:#ffd84d;
    --bg:#0b0b0b;
    --card:#121212;
    --border:#262626;
}

/* ===== BODY ===== */
body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    background:
        radial-gradient(circle at 15% 10%, #1f1a00 0%, #000 60%),
        #000;

    color:#eee;
}

/* ===== CARD ===== */
.activate-card{
    width:100%;
    max-width:420px;

    padding:42px 28px;

    border-radius:22px;

    background:linear-gradient(145deg,#101010,#141414);

    border:1px solid var(--border);

    box-shadow:
        0 0 60px rgba(255,204,0,.10),
        0 0 120px rgba(255,204,0,.04);

    animation:fadeIn .6s ease;
}

/* ===== TITLE ===== */
.activate-title{
    text-align:center;
    font-size:26px;
    font-weight:800;
    color:var(--yellow);

    text-shadow:0 0 15px rgba(255,204,0,.6);
    margin-bottom:6px;
}

/* ===== SUBTITLE ===== */
.activate-subtitle{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-bottom:22px;
}

/* ===== INFO BOX ===== */
.info-embed{
    background:rgba(255,204,0,.07);
    border:1px solid rgba(255,204,0,.25);
    border-radius:12px;
    padding:14px;
    margin-bottom:22px;
    font-size:13px;
}

/* ===== FORM ===== */
.activate-form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* ===== LABEL ===== */
.activate-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
    color:var(--yellow);
}

/* ===== INPUT GROUP ===== */
.activate-input-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* ===== INPUT ===== */
.activate-input{
    padding:15px 16px;

    border-radius:14px;

    border:1px solid #2b2b2b;

    background:#0a0a0a;

    color:#fff;
    font-size:15px;

    transition:.25s;

    box-shadow: inset 0 0 8px rgba(0,0,0,.7);
}

.activate-input:focus{
    outline:none;

    border-color:var(--yellow);

    box-shadow:
        0 0 0 3px rgba(255,204,0,.25),
        0 0 20px rgba(255,204,0,.35);

    background:#121212;
}

/* ===== WRAPPER ===== */
.activate-input-wrapper{
    display:flex;
    gap:10px;
}

/* ===== PASTE BTN ===== */
.activate-paste-button{
    padding:0 16px;

    border-radius:14px;

    border:1px solid var(--yellow);

    background:#191900;

    color:#fff;

    font-weight:600;
    cursor:pointer;

    transition:.25s;
}

.activate-paste-button:hover{
    background:#2a2a00;
}

/* ===== MAIN BUTTON ===== */
.activate-button{
    margin-top:10px;
    padding:16px;

    border-radius:14px;
    border:none;

    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;

    background:linear-gradient(135deg,var(--yellow),#ffb300);

    color:#000;

    cursor:pointer;

    transition:.25s;

    box-shadow:0 0 25px rgba(255,204,0,.45);
}

.activate-button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 40px rgba(255,204,0,.8);
}

/* ===== ERROR ===== */
.activate-error{
    font-size:12px;
    color:#ffe082;
    display:none;
}
.activate-error.visible{
    display:block;
}

/* ===== FOOTER ===== */
.activate-help{
    margin-top:24px;
    text-align:center;
    font-size:12px;
}

.activate-help a{
    color:var(--yellow);
    text-decoration:none;
    font-weight:700;
}

/* ===== ANIM ===== */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>

<script src="js/theme.js" defer></script>
<script src="js/update-checker.js" defer></script>
<script type="module" src="js/pages/activate.js" defer></script>

</head>

<body>

<div class="activate-card">

    <h1 class="activate-title">Aktywacja urządzenia</h1>
    <p class="activate-subtitle"><b>RUCH NA SERWERZE JEST MONITOROWANY 24/7</b></p>

    <div class="info-embed">
        <b>
        • jeden klucz = jedno urządzenie<br>
        • masz problem? otwórz ticket<br>
        • zapisz klucz
        </b>
    </div>

    <!-- FUNKCJE ZOSTAJĄ (TE SAME ID!) -->
    <form id="activateForm" class="activate-form">

        <div class="activate-input-group">
            <label class="activate-label">Klucz aktywacyjny</label>

            <div class="activate-input-wrapper">
                <input id="adminKeyInput" class="activate-input" placeholder="XXXX-XXXX-XXXX-XXXX">
                <button type="button" id="pasteButton" class="activate-paste-button">Wklej</button>
            </div>

            <span id="keyError" class="activate-error">Nieprawidłowy klucz</span>
        </div>

        <div class="activate-input-group">
            <label class="activate-label">Nazwa (nick z discord)</label>
            <input id="deviceLabelInput" class="activate-input" placeholder="np. user0134">
            <span id="labelError" class="activate-error">Wymagane</span>
        </div>

        <button type="submit" id="activateButton" class="activate-button">
            Aktywuj
        </button>
    </form>

    <div class="activate-help">
        <a href="#">Created by Butcher</a>
    </div>

</div>
<script type="module" src="images.js"></script>

</body>
</html>
