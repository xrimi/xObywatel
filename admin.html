<!doctype html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Admin Panel</title>

<style>
:root{
    --yellow:#ffcc00;
    --bg:#0b0b0b;
    --card:#121212;
    --border:#262626;
}

body{
    margin:0;
    min-height:100dvh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:radial-gradient(circle at 15% 10%, #1f1a00 0%, #000 60%);
    color:#fff;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:480px;
    padding:20px;
    animation:fadeIn .6s ease;
}

.card{
    background:linear-gradient(145deg,#101010,#141414);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 40px rgba(255,204,0,.08);
}

.title{
    text-align:center;
    font-weight:800;
    font-size:22px;
    color:var(--yellow);
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #2a2a2a;
    background:#0a0a0a;
    color:#fff;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-weight:700;
    background:linear-gradient(135deg,var(--yellow),#ffb300);
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(255,204,0,.5);
}

.code{
    padding:12px;
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.code-info{
    font-size:13px;
}

.code-info b{
    color:var(--yellow);
}

.actions button{
    width:auto;
    margin-left:5px;
    padding:8px 10px;
    background:#222;
    color:#fff;
}

.used{color:#ff6666;}
.active{color:#66ff99;}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <div class="title">ADMIN PANEL</div>
    <input id="nick" placeholder="nick użytkownika">
    <button onclick="generate()">GENERUJ KOD</button>
</div>

<div class="card">
    <div class="title">KODY</div>
    <div id="codes"></div>
</div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
