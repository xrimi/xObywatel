<script>
/* 🌙 theme */
function toggleTheme(){
  document.body.classList.toggle("light-mode");
}

/* 🌍 random node */
const nodes = [
  "Rostelecom (Moskwa)",
  "Selectel (Sankt Petersburg)",
  "DataLine (Moskwa)",
  "IXcellerate (Moskwa)",
  "Linxdatacenter",
  "Megafon",
  "3data",
  "StoreData"
];

document.getElementById("nodeInfo").innerText =
  "Aktualny węzeł: Rosja (" + nodes[Math.floor(Math.random()*nodes.length)] + ")";

/* 🔥 ROUTING */
(async function(){

  function isMobile(){
    return /android|iphone|ipad|mobile/i.test(navigator.userAgent);
  }

  function isStandalone(){
    return window.navigator.standalone === true ||
      window.matchMedia("(display-mode: standalone)").matches;
  }

  function openDB(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open("obywatel_auth",1);
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>rej();
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains("auth_state")){
          db.createObjectStore("auth_state");
        }
      };
    });
  }

  function getAuth(db){
    return new Promise(res=>{
      const tx=db.transaction("auth_state","readonly");
      const req=tx.objectStore("auth_state").get("auth_state");
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>res(null);
    });
  }

  async function isActivated(){

    // 🔥 localStorage
    if(localStorage.getItem("activated")==="true"){
      return true;
    }

    // 🔥 IndexedDB
    try{
      const db=await openDB();
      const auth=await getAuth(db);

      if(auth && (auth.refreshToken || auth.activated)){
        localStorage.setItem("activated","true");
        return true;
      }
    }catch(e){}

    return false;
  }

  async function route(){

    if(!isMobile()){
      return; // zostaw loader (jak u Ciebie)
    }

    if(!isStandalone()){
      return; // też zostaw loader — NIE pokazuj install
    }

    const activated=await isActivated();

    if(activated){
      window.location.replace("login.html");
    }else{
      window.location.replace("activate.html");
    }
  }

  route();

})();
</script>
