<script>
(async function () {

  function isMobile() {
    const ua = navigator.userAgent.toLowerCase();
    return /android|iphone|ipad|mobile/.test(ua);
  }

  function isStandalone() {
    return window.navigator.standalone === true ||
      window.matchMedia("(display-mode: standalone)").matches;
  }

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open("obywatel_auth", 1);
      req.onerror = () => reject();
      req.onsuccess = () => resolve(req.result);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("auth_state")) {
          db.createObjectStore("auth_state");
        }
      };
    });
  }

  function getAuth(db) {
    return new Promise((resolve) => {
      const tx = db.transaction("auth_state", "readonly");
      const store = tx.objectStore("auth_state");
      const req = store.get("auth_state");
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  }

  async function isActivated() {

    if (localStorage.getItem("activated") === "true") {
      return true;
    }

    try {
      const db = await openDB();
      const auth = await getAuth(db);

      if (auth && (auth.refreshToken || auth.activated)) {
        localStorage.setItem("activated", "true");
        return true;
      }
    } catch (e) {}

    return false;
  }

  function showInstall() {
    document.getElementById("app").innerHTML = `
      <div class="card">
        <div class="icon">⬇️</div>
        <div class="title">Zainstaluj aplikację</div>
        <div class="subtitle">
          Aby korzystać z mObywatel, dodaj aplikację do ekranu głównego
        </div>

        <div class="instructions">
          <strong>Jak zainstalować:</strong><br><br>

          <strong>iOS (Safari):</strong><br>
          1. Dotknij przycisku udostępniania<br>
          2. Wybierz "Dodaj do ekranu głównego"<br><br>

          <strong>Android (Chrome):</strong><br>
          1. Dotknij menu ⋮<br>
          2. Wybierz "Dodaj do ekranu głównego"
        </div>
      </div>
    `;
  }

  async function route() {

    if (!isMobile()) {
      document.getElementById("app").innerHTML = "<h1>Only mobile</h1>";
      return;
    }

    if (!isStandalone()) {
      showInstall();
      return;
    }

    const activated = await isActivated();

    if (activated) {
      window.location.replace("login.html");
    } else {
      window.location.replace("activate.html");
    }
  }

  route();

})();
</script>
